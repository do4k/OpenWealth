services:
  openwealth:
    build: .
    image: openwealth:latest
    ports:
      - "8080:8080"
    environment:
      # REQUIRED: set in a .env file next to this compose file (see .env.example):
      #   JWT__KEY=$(openssl rand -base64 48)
      - JWT__KEY=${JWT__KEY:?Set JWT__KEY to a random secret of 32+ characters}
      - TZ=${TZ:-Europe/London}
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      # The aspnet base image ships no curl/wget; bash's /dev/tcp is enough to
      # prove the server is accepting connections.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      # Cap log growth — kind to SD cards on a Raspberry Pi.
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
