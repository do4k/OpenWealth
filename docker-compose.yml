services:
  openwealth:
    build: .
    ports:
      - "8080:8080"
    environment:
      # REQUIRED: set a long random secret before first run, e.g.
      #   JWT__KEY=$(openssl rand -base64 48)
      - JWT__KEY=${JWT__KEY:?Set JWT__KEY to a random secret of 32+ characters}
    volumes:
      - ./data:/data
    restart: unless-stopped
